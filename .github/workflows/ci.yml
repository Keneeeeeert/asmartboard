name: CI
permissions:
    contents: read

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    workflow_dispatch:

jobs:
    build:
        name: build (${{ matrix.name }})
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    # ---------- Linux ----------
                    - name: linux-x86_64
                      os: ubuntu-latest
                      arch: x86_64

                    # ---------- Windows ----------
                    - name: windows-x86_64
                      os: windows-latest
                      arch: x86_64

                    # ---------- macOS Intel ----------
                    - name: macos-x86_64
                      os: macos-15-intel
                      arch: x86_64

                    # ---------- macOS Apple Silicon ----------
                    - name: macos-aarch64
                      os: macos-latest
                      arch: aarch64

                    # ---------- Linux -> Windows x86_64 ----------
                    - name: cross-win-x86_64
                      os: ubuntu-latest
                      arch: x86_64
                      target: x86_64-pc-windows-gnullvm
                      mingw_arch: x86_64-w64-mingw32

                    # ---------- Linux -> Windows aarch64 ----------
                    - name: cross-win-aarch64
                      os: ubuntu-latest
                      arch: aarch64
                      target: aarch64-pc-windows-gnullvm
                      mingw_arch: aarch64-w64-mingw32

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install Rust nightly toolchain
              uses: dtolnay/rust-toolchain@nightly

            - uses: Swatinem/rust-cache@v2
              with:
                  cache-on-failure: true

            - name: Install system dependencies (Linux)
              if: matrix.os == 'ubuntu-latest'
              run: |
                  sudo apt update
                  sudo apt install -y \
                    libasound2-dev \
                    libglib2.0-dev \
                    libgtk-3-dev \
                    libappindicator3-dev \
                    libxdo-dev \
                    pkg-config

            - name: Install system dependencies (macOS)
              if: startsWith(matrix.os, 'macos')
              run: |
                  brew update

            - name: Setup llvm-mingw (cross-compile)
              if: matrix.target
              run: |
                  sudo mkdir -p /opt/llvm-mingw
                  curl -L "https://github.com/mstorsjo/llvm-mingw/releases/download/20260505/llvm-mingw-20260505-ucrt-ubuntu-22.04-x86_64.tar.xz" | sudo tar xJ -C /opt/llvm-mingw --strip-components=1
                  echo "/opt/llvm-mingw/bin" >> "$GITHUB_PATH"
                  mkdir -p ~/.cargo
                  cat >> ~/.cargo/config.toml << 'EOF'
[target.x86_64-pc-windows-gnullvm]
linker = "x86_64-w64-mingw32-clang"
ar = "x86_64-w64-mingw32-ar"
rustflags = ["-Ctarget-feature=+crt-static"]

[target.aarch64-pc-windows-gnullvm]
linker = "aarch64-w64-mingw32-clang"
ar = "aarch64-w64-mingw32-ar"
rustflags = ["-Ctarget-feature=+crt-static"]
EOF

            - name: Add Rust target (cross-compile)
              if: matrix.target
              run: rustup target add ${{ matrix.target }}

            - name: Build debug
              if: ${{ !matrix.target }}
              run: cargo build --verbose

            - name: Build release
              if: ${{ !matrix.target }}
              run: cargo build --release --verbose

            - name: Build release (cross-compile)
              if: matrix.target
              run: cargo build --release --verbose --target ${{ matrix.target }}

            - name: Upload debug artifacts
              if: ${{ !matrix.target }}
              uses: actions/upload-artifact@v6
              with:
                  name: debug-${{ matrix.name }}
                  path: target/debug/uwu*
                  if-no-files-found: error

            - name: Upload release artifacts
              if: ${{ !matrix.target }}
              uses: actions/upload-artifact@v6
              with:
                  name: release-${{ matrix.name }}
                  path: target/release/uwu*
                  if-no-files-found: error

            - name: Upload release artifacts (cross-compile)
              if: matrix.target
              uses: actions/upload-artifact@v6
              with:
                  name: release-${{ matrix.name }}
                  path: target/${{ matrix.target }}/release/uwu*
                  if-no-files-found: error
